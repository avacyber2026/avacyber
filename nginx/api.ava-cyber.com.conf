# API Backend — api.ava-cyber.com -> localhost:3020
# client_max_body_size: multipart reports + attachments (default 1m causes 413)
server {
    listen 80;
    listen [::]:80;
    server_name api.ava-cyber.com;

    client_max_body_size 32m;

    access_log /var/log/nginx/secureconnect-api-access.log;
    error_log  /var/log/nginx/secureconnect-api-error.log;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
