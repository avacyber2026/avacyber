# Landing Next.js — landing.ava-cyber.com -> localhost:3001 (HTTP + HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name landing.ava-cyber.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name landing.ava-cyber.com;

    ssl_certificate /etc/letsencrypt/live/landing.ava-cyber.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/landing.ava-cyber.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/secureconnect-landing-access.log;
    error_log  /var/log/nginx/secureconnect-landing-error.log;

    add_header X-Served-By "secureconnect-landing" always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
