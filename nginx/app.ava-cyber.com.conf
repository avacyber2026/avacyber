# Frontend Next.js — app.ava-cyber.com -> localhost:3000
server {
    listen 80;
    listen [::]:80;
    server_name app.ava-cyber.com;

    access_log /var/log/nginx/secureconnect-app-access.log;
    error_log  /var/log/nginx/secureconnect-app-error.log;

    # Next.js static assets: long cache (filenames have content hashes)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        # Don't cache HTML so users get fresh chunk references after deploy
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
